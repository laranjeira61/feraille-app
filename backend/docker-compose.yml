version: '3.8'

services:
  feraille-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: feraille-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Persistent SQLite database storage
      # On Synology: maps to ./data on the host (same directory as docker-compose.yml)
      - ./data:/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/data/feraille.db
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    # Resource limits suitable for Synology DS220+
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: feraille-network
